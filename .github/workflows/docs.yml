name: Documentation

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Mike needs full history to manage the gh-pages branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Zensical, Mike, and Gold lexer
        run: |
          pip install zensical git+https://github.com/squidfunk/mike ./docs/lexer

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy Master to Dev
        if: github.ref == 'refs/heads/master'
        run: mike deploy --push --update-aliases dev

      - name: Deploy Tagged Version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          VERSION=${VERSION%.*}
          LATEST_TAG=$(git tag --list 'v*' | sort -V | tail -1)
          if [ "$GITHUB_REF_NAME" = "$LATEST_TAG" ]; then
            mike deploy --push --update-aliases $VERSION latest
          else
            mike deploy --push $VERSION
          fi
